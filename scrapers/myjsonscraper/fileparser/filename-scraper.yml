name: Filename Parser
sceneByFragment:
  action: script
  script:
    - python
    - filename_parser.py
    - sceneByFragment
imageByFragment:
  action: script
  script:
    - python
    - filename_parser.py
    - imageByFragment
    - debug=1
    - studioSuffix=" (X)"
    - codeMinDigits=12
